on:
  push:
    branches:
      - main
    paths-ignore:
      - .editorconfig
      - .gitignore
      - README.md
      - LICENSE.md

jobs:
  build:
    name: Build and upload to container registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@master

      - name: Use Node.js 20.x
        uses: actions/setup-node@master
        with:
          node-version: 20.x

      - name: Cache node_modules
        uses: actions/cache@master
        with:
          path: |
            ~/node_modules
          key: ${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build
        run: npm install && npm run build

      - name: Build container image
        run: bin/build $(echo $GITHUB_SHA | head -c7) .

      - name: Push image to sminn.ee Container Registry
        run: bin/push $(echo $GITHUB_SHA | head -c7)
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  deploy:
    name: Deploy to production
    environment: prod
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Checkout main
        uses: actions/checkout@master

      - name: Parse Tailscale OAuth secret
        env:
          TAILSCALE_OAUTH: ${{ secrets.TAILSCALE_OAUTH }}
        run: |
          echo "TS_CLIENT_ID=$(printf '%s\n' "$TAILSCALE_OAUTH" | sed -n 's/^client_id: *//p')" >> "$GITHUB_ENV"
          client_secret=$(printf '%s\n' "$TAILSCALE_OAUTH" | sed -n 's/^client_secret: *//p')
          echo "::add-mask::$client_secret"
          echo "TS_SECRET=$client_secret" >> "$GITHUB_ENV"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ env.TS_CLIENT_ID }}
          oauth-secret: ${{ env.TS_SECRET }}
          tags: tag:sminnee-prod-deploy

      - name: Configure kubeconfig over tailnet
        run: tailscale configure kubeconfig tailscale-operator

      - name: Update Kubernetes deployment
        run: bin/deploy $(echo $GITHUB_SHA | head -c7)
